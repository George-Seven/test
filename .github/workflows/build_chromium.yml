            --device /dev/net/tun:/dev/net/tun \
            -e TS_AUTHKEY="${{ secrets.TAILSCALE_KEY }}" \
            -e TS_HOSTNAME="$RUNNER_NODE" \
            -e TS_STATE_DIR=/var/lib/tailscale \
            -e TS_USERSPACE=0 \
            -v "$GITHUB_WORKSPACE/tailscale:/var/lib/tailscale" \
            tailscale/tailscale:latest
          if [ "${{ inputs.cycle }}" = "998" ]; then
            TAILSCALE_IP="${{ secrets.TAILSCALE_IP_2 }}" 
          else
            TAILSCALE_IP="${{ secrets.TAILSCALE_IP_1 }}"
          fi
          echo "
          uid = root
          gid = root
          use chroot = no
          hosts allow = $TAILSCALE_IP
          
          [$RUNNER_NODE]
          path = $GITHUB_WORKSPACE
          read only = no
          munge symlinks = no
          " > "$GITHUB_WORKSPACE/rsyncd.conf"
          sudo rsync --daemon --config="$GITHUB_WORKSPACE/rsyncd.conf"
          #export HOME="$GITHUB_WORKSPACE"
          #export PATH="$HOME/depot_tools:$PATH"
          while [ ! -f "$GITHUB_WORKSPACE/.rsync_complete" ]; do sleep 5; done
          rm -rf "$GITHUB_WORKSPACE/.rsync_complete"
          docker stop tailscale
          sudo rm -rf "$GITHUB_WORKSPACE/tailscale"       

      - name: Setup tmate session
        if: ${{ inputs.cycle == '998' || inputs.cycle == '999' }}
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true

      - name: test
        if: ${{ inputs.cycle == '998' || inputs.cycle == '999' }}
        run: |
          sleep infinity
          exit 0
