          rsync -a --inplace "$GITHUB_WORKSPACE/chrome/" rsync://${{ secrets.TAILSCALE_IP_1 }}/runner-node-1/chrome
          touch "$GITHUB_WORKSPACE/.rsync_complete"
          rsync -a --inplace "$GITHUB_WORKSPACE/.rsync_complete" rsync://${{ secrets.TAILSCALE_IP_1 }}/runner-node-1/.rsync_complete
          docker stop tailscale
