name: Build Chromium
run-name: ${{ (inputs.cycle == '998' || inputs.cycle == '999') && 'Releasing Build' || format('Chromium Build (Cycle {0})', inputs.cycle) }}
  
on:
  workflow_dispatch:
    inputs:
      cycle:
        description: "Current cycle number"
        required: false
        default: "1"

jobs:
  build:
    permissions:
      actions: write
      contents: write
    runs-on: ubuntu-24.04

    steps:
      - name: Clean Docker
        run: |
          sudo systemctl stop docker.service || true
          sudo systemctl stop docker.socket || true
          sudo rm -rf /var/lib/docker
          sudo mkdir -p /var/lib/docker
          sudo systemctl start docker.service

      - name: Maximize runner disk
        uses: justinthelaw/maximize-github-runner-space@v0.6.2
        with:
          cleanup-profile: max

      # ========================
      # MAIN CYCLE
      # ========================
      - name: Run Cycle
        if: ${{ inputs.cycle != '998' && inputs.cycle != '999' }}
        run: |
          CYCLE=${{ inputs.cycle }}

          # Node selection (normal cycles only)
          if (( CYCLE % 2 == 1 )); then
            NODE="runner-node-1"
            STATE='${{ secrets.TAILSCALE_STATE_1 }}'
            PEER_IP='${{ secrets.TAILSCALE_IP_2 }}'
            FINAL_CODE=998
          else
            NODE="runner-node-2"
            STATE='${{ secrets.TAILSCALE_STATE_2 }}'
            PEER_IP='${{ secrets.TAILSCALE_IP_1 }}'
            FINAL_CODE=999
          fi

          echo "Running cycle $CYCLE on $NODE"

          mkdir -p "$GITHUB_WORKSPACE/tailscale"
          echo "$STATE" > "$GITHUB_WORKSPACE/tailscale/tailscaled.state"

          docker run --rm -d \
            --name tailscale \
            --network host \
            --cap-add NET_ADMIN \
            --cap-add NET_RAW \
            --device /dev/net/tun:/dev/net/tun \
            -e TS_AUTHKEY="${{ secrets.TAILSCALE_KEY }}" \
            -e TS_HOSTNAME=$NODE \
            -e TS_STATE_DIR=/var/lib/tailscale \
            -e TS_USERSPACE=0 \
            -v "$GITHUB_WORKSPACE/tailscale:/var/lib/tailscale" \
            tailscale/tailscale:latest

          echo "
          uid = root
          gid = root
          use chroot = no
          hosts allow = $PEER_IP

          [$NODE]
          path = $GITHUB_WORKSPACE
          read only = no
          munge symlinks = no
          " > "$GITHUB_WORKSPACE/rsyncd.conf"

          sudo rsync --daemon --config="$GITHUB_WORKSPACE/rsyncd.conf"

          export HOME="$GITHUB_WORKSPACE"
          export PATH="$HOME/depot_tools:$PATH"

          if [ "$CYCLE" = "1" ]; then
            git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$HOME/depot_tools"

            mkdir -p "$HOME/chrome"
            cd "$HOME/chrome"
            fetch --no-history --nohooks chromium

            cd src
            gclient runhooks

            mkdir -p out/Default
            echo "
            is_debug = false
            is_official_build = true
            v8_symbol_level=0
            blink_symbol_level=0
            dcheck_always_on = false
            chrome_pgo_phase = 0
            symbol_level = 0
            target_cpu = \"arm64\" 
            " > out/Default/args.gn

            ./build/linux/sysroot_scripts/install-sysroot.py --arch=arm64
            gn gen out/Default
          else
            while [ ! -f "$GITHUB_WORKSPACE/.rsync_complete" ]; do sleep 5; done
            rm -f "$GITHUB_WORKSPACE/.rsync_complete"
            cd "$HOME/chrome/src"
          fi

          ./build/install-build-deps.sh --arm

          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

          timeout 270m autoninja -C out/Default && touch out/Default/.build_complete || true

          NEXT_CYCLE=$((CYCLE + 1))

          if [ -f out/Default/.build_complete ]; then
            FINAL=$FINAL_CODE
          elif [ "$CYCLE" = "15" ]; then
            FINAL=$FINAL_CODE
          else
            FINAL=$NEXT_CYCLE
          fi

          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/build_chromium.yml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"cycle\":\"$FINAL\"}}"

          while ! rsync rsync://$PEER_IP/ >/dev/null 2>&1; do sleep 5; done

          rsync -a --inplace "$GITHUB_WORKSPACE/depot_tools/" rsync://$PEER_IP/$NODE/depot_tools
          rsync -a --inplace "$GITHUB_WORKSPACE/.cache/" rsync://$PEER_IP/$NODE/.cache
          rsync -a --inplace "$GITHUB_WORKSPACE/chrome/" rsync://$PEER_IP/$NODE/chrome

          touch "$GITHUB_WORKSPACE/.rsync_complete"
          rsync -a "$GITHUB_WORKSPACE/.rsync_complete" rsync://$PEER_IP/$NODE/.rsync_complete

          docker stop tailscale

      # ========================
      # BUILD COMPLETE
      # ========================
      - name: Build Complete
        if: ${{ inputs.cycle == '998' || inputs.cycle == '999' }}
        run: |
          CYCLE=${{ inputs.cycle }}

          if [ "$CYCLE" = "998" ]; then
            RUNNER_NODE="runner-node-1"
            STATE='${{ secrets.TAILSCALE_STATE_1 }}'
            PEER_IP='${{ secrets.TAILSCALE_IP_2 }}'
          else
            RUNNER_NODE="runner-node-2"
            STATE='${{ secrets.TAILSCALE_STATE_2 }}'
            PEER_IP='${{ secrets.TAILSCALE_IP_1 }}'
          fi

          mkdir -p "$GITHUB_WORKSPACE/tailscale"
          echo "$STATE" > "$GITHUB_WORKSPACE/tailscale/tailscaled.state"

          docker run --rm -d \
            --name tailscale \
            --network host \
            --cap-add NET_ADMIN \
            --cap-add NET_RAW \
            --device /dev/net/tun:/dev/net/tun \
            -e TS_AUTHKEY="${{ secrets.TAILSCALE_KEY }}" \
            -e TS_HOSTNAME="$RUNNER_NODE" \
            -e TS_STATE_DIR=/var/lib/tailscale \
            -e TS_USERSPACE=0 \
            -v "$GITHUB_WORKSPACE/tailscale:/var/lib/tailscale" \
            tailscale/tailscale:latest

          echo "
          uid = root
          gid = root
          use chroot = no
          hosts allow = $PEER_IP

          [$RUNNER_NODE]
          path = $GITHUB_WORKSPACE
          read only = no
          munge symlinks = no
          " > "$GITHUB_WORKSPACE/rsyncd.conf"

          sudo rsync --daemon --config="$GITHUB_WORKSPACE/rsyncd.conf"

          while [ ! -f "$GITHUB_WORKSPACE/.rsync_complete" ]; do sleep 5; done
          rm -f "$GITHUB_WORKSPACE/.rsync_complete"

          docker stop tailscale
          sudo pkill rsync || true

          rm -rf "$GITHUB_WORKSPACE/rsyncd.conf"
          rm -rf "$GITHUB_WORKSPACE/tailscale"

      # ========================
      # RELEASE
      # ========================
      - name: Create Release
        if: ${{ inputs.cycle == '998' || inputs.cycle == '999' }}
        run: |
          cd $GITHUB_WORKSPACE/chrome/src
          mkdir chromium-dist

          cp out/Default/chrome chromium-dist/
          cp out/Default/chrome-wrapper chromium-dist/
          cp out/Default/chrome_crashpad_handler chromium-dist/
          cp out/Default/icudtl.dat chromium-dist/
          cp out/Default/*.pak chromium-dist/
          cp out/Default/*snapshot*.bin chromium-dist/
          cp out/Default/libEGL.so chromium-dist/
          cp out/Default/libGLESv2.so chromium-dist/
          cp out/Default/libvk_swiftshader.so chromium-dist/
          cp out/Default/libvulkan.so.1 chromium-dist/
          cp out/Default/vk_swiftshader_icd.json chromium-dist/
          cp -r out/Default/locales chromium-dist/
          cp -r out/Default/resources chromium-dist/

          find chromium-dist -type f \( -name "*.so" -o -name "chrome*" \) \
            -exec third_party/llvm-build/Release+Asserts/bin/llvm-strip {} \; &>/dev/null || true

          zip -r chromium-dist.zip chromium-dist/

      - name: Upload Release
        if: ${{ inputs.cycle == '998' || inputs.cycle == '999' }}
        uses: softprops/action-gh-release@v2
        with:
          files: chrome/src/chromium-dist.zip
          prerelease: false
          tag_name: chromium-arm64
