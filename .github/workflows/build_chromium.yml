name: Build Chromium

on:
  workflow_dispatch:
    inputs:
      cycle:
        description: "Current cycle number"
        required: false
        default: "1"

permissions:
  actions: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Clean Docker
        run: |
          sudo systemctl stop docker.service
          sudo systemctl stop docker.socket
          sudo rm -rf /var/lib/docker
          sudo mkdir -p /var/lib/docker
          sudo systemctl start docker.service

      - name: Maximize runner disk
        uses: justinthelaw/maximize-github-runner-space@v0.6.2
        with:
          cleanup-profile: max

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true

      - name: Cycle 1
        if: ${{ inputs.cycle == '1' }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tailscale"
          echo "${{ secrets.GITHUB_TOKEN }}" > "$GITHUB_WORKSPACE/.GH_TOKEN"
          echo '${{ secrets.TAILSCALE_STATE_1 }}' > "$GITHUB_WORKSPACE/tailscale/tailscaled.state"
          docker run --rm -d \
            --name tailscale \
            --network host \
            --cap-add NET_ADMIN \
            --cap-add NET_RAW \
            --device /dev/net/tun:/dev/net/tun \
            -e TS_AUTHKEY="${{ secrets.TAILSCALE_KEY }}" \
            -e TS_HOSTNAME=runner-node-1 \
            -e TS_STATE_DIR=/var/lib/tailscale \
            -e TS_USERSPACE=0 \
            -v "$GITHUB_WORKSPACE/tailscale:/var/lib/tailscale" \
            tailscale/tailscale:latest
          echo "
          uid = root
          gid = root
          use chroot = no
          hosts allow = ${{ secrets.TAILSCALE_IP_2 }}
          
          [runner-node-1]
          path = $GITHUB_WORKSPACE
          read only = no
          munge symlinks = no
          " > "$GITHUB_WORKSPACE/rsyncd.conf"
          sudo rsync --daemon --config="$GITHUB_WORKSPACE/rsyncd.conf"
          export HOME="$GITHUB_WORKSPACE"
          export PATH="$HOME/depot_tools:$PATH"
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$HOME/depot_tools"
          mkdir -p "$HOME/chrome"
          cd "$HOME/chrome"
          fetch --no-history --nohooks chromium
          cd src
          gclient runhooks
          ./build/install-build-deps.sh --arm
          mkdir out/Default
          echo "
          is_debug = false
          is_official_build = true
          v8_symbol_level=0
          blink_symbol_level=0
          dcheck_always_on = false
          chrome_pgo_phase = 0
          symbol_level = 0
          target_cpu = \"arm64\"
          " > out/Default/args.gn
          ./build/linux/sysroot_scripts/install-sysroot.py --arch=arm64
          gn gen out/Default
          sudo swapoff -a; sudo rm -f /swapfile; sudo fallocate -l 20G /swapfile; sudo chmod 600 /swapfile; sudo mkswap /swapfile; sudo swapon /swapfile
          timeout 5m autoninja -C out/Default && touch out/Default/.build_complete || true
          NEXT_CYCLE=$(( ${{ inputs.cycle }} + 1 ))
          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/build_chromium.yml/dispatches \
          -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"cycle\":\"$NEXT_CYCLE\"}}"
          while ! rsync rsync://${{ secrets.TAILSCALE_IP_2 }} >/dev/null 2>&1; do sleep 5; done
          rsync -a --info=progress2 --inplace "$GITHUB_WORKSPACE/depot_tools/" rsync://${{ secrets.TAILSCALE_IP_2 }}/runner-node-2/depot_tools
          rsync -a --info=progress2 --inplace "$GITHUB_WORKSPACE/.cache/" rsync://${{ secrets.TAILSCALE_IP_2 }}/runner-node-2/.cache
          rsync -a --info=progress2 --inplace "$GITHUB_WORKSPACE/chrome/" rsync://${{ secrets.TAILSCALE_IP_2 }}/runner-node-2/chrome
          touch "$GITHUB_WORKSPACE/.rsync_complete"
          rsync -a --info=progress2 --inplace "$GITHUB_WORKSPACE/.rsync_complete" rsync://${{ secrets.TAILSCALE_IP_2 }}/runner-node-2/.rsync_complete
          docker stop tailscale
          sleep 2h
          exit 0

      - name: Cycle 2
        if: ${{ inputs.cycle == '2' }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tailscale"
          echo "${{ secrets.GITHUB_TOKEN }}" > "$GITHUB_WORKSPACE/.GH_TOKEN"
          echo '${{ secrets.TAILSCALE_STATE_2 }}' > "$GITHUB_WORKSPACE/tailscale/tailscaled.state"
          docker run --rm -d \
            --name tailscale \
            --network host \
            --cap-add NET_ADMIN \
            --cap-add NET_RAW \
            --device /dev/net/tun:/dev/net/tun \
            -e TS_AUTHKEY="${{ secrets.TAILSCALE_KEY }}" \
            -e TS_HOSTNAME=runner-node-2 \
            -e TS_STATE_DIR=/var/lib/tailscale \
            -e TS_USERSPACE=0 \
            -v "$GITHUB_WORKSPACE/tailscale:/var/lib/tailscale" \
            tailscale/tailscale:latest
          echo "
          uid = root
          gid = root
          use chroot = no
          hosts allow = ${{ secrets.TAILSCALE_IP_1 }}
          
          [runner-node-2]
          path = $GITHUB_WORKSPACE
          read only = no
          munge symlinks = no
          " > "$GITHUB_WORKSPACE/rsyncd.conf"
          sudo rsync --daemon --config="$GITHUB_WORKSPACE/rsyncd.conf"
          export HOME="$GITHUB_WORKSPACE"
          export PATH="$HOME/depot_tools:$PATH"
          while [ ! -f "$GITHUB_WORKSPACE/.rsync_complete" ]; do sleep 5; done
          rm -rf "$GITHUB_WORKSPACE/.rsync_complete"
          cd "$HOME/chrome/src"
          sudo swapoff -a; sudo rm -f /swapfile; sudo fallocate -l 20G /swapfile; sudo chmod 600 /swapfile; sudo mkswap /swapfile; sudo swapon /swapfile
          timeout 5m autoninja -C out/Default && touch out/Default/.build_complete || true
          NEXT_CYCLE=$(( ${{ inputs.cycle }} + 1 ))
          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/build_chromium.yml/dispatches \
          -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"cycle\":\"$NEXT_CYCLE\"}}"
          while ! rsync rsync://${{ secrets.TAILSCALE_IP_1 }} >/dev/null 2>&1; do sleep 5; done
          rsync -a --info=progress2 --inplace "$GITHUB_WORKSPACE/depot_tools/" rsync://${{ secrets.TAILSCALE_IP_1 }}/runner-node-1/depot_tools
          rsync -a --info=progress2 --inplace "$GITHUB_WORKSPACE/.cache/" rsync://${{ secrets.TAILSCALE_IP_1 }}/runner-node-1/.cache
          rsync -a --info=progress2 --inplace "$GITHUB_WORKSPACE/chrome/" rsync://${{ secrets.TAILSCALE_IP_1 }}/runner-node-1/chrome
          touch "$GITHUB_WORKSPACE/.rsync_complete"
          rsync -a --info=progress2 --inplace "$GITHUB_WORKSPACE/.rsync_complete" rsync://${{ secrets.TAILSCALE_IP_1 }}/runner-node-1/.rsync_complete
          docker stop tailscale
          sleep 2h
          exit 0

      - name: Cycle 3
        if: ${{ inputs.cycle == '3' }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/tailscale
          echo "${{ secrets.GITHUB_TOKEN }}" > "$GITHUB_WORKSPACE/.GH_TOKEN"
          echo '${{ secrets.TAILSCALE_STATE_1 }}' > "$GITHUB_WORKSPACE/tailscale/tailscaled.state"
          docker run --rm -d \
            --name tailscale \
            --network host \
            --cap-add NET_ADMIN \
            --cap-add NET_RAW \
            --device /dev/net/tun:/dev/net/tun \
            -e TS_AUTHKEY="${{ secrets.TAILSCALE_KEY }}" \
            -e TS_HOSTNAME=runner-node-1 \
            -e TS_STATE_DIR=/var/lib/tailscale \
            -e TS_USERSPACE=0 \
            -v "$GITHUB_WORKSPACE/tailscale:/var/lib/tailscale" \
            tailscale/tailscale:latest
          echo "
          uid = root
          gid = root
          use chroot = no
          hosts allow = ${{ secrets.TAILSCALE_IP_2 }}
          
          [runner-node-1]
          path = $GITHUB_WORKSPACE
          read only = no
          munge symlinks = no
          " > "$GITHUB_WORKSPACE/rsyncd.conf"
          sudo rsync --daemon --config="$GITHUB_WORKSPACE/rsyncd.conf"
          export HOME="$GITHUB_WORKSPACE"
          export PATH="$HOME/depot_tools:$PATH"
          while [ ! -f "$GITHUB_WORKSPACE/.rsync_complete" ]; do sleep 5; done
          rm -rf "$GITHUB_WORKSPACE/.rsync_complete"
          cd "$HOME/chrome/src"
          sudo swapoff -a; sudo rm -f /swapfile; sudo fallocate -l 20G /swapfile; sudo chmod 600 /swapfile; sudo mkswap /swapfile; sudo swapon /swapfile
          timeout 5m autoninja -C out/Default && touch out/Default/.build_complete || true
          NEXT_CYCLE=$(( ${{ inputs.cycle }} + 1 ))
          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/build_chromium.yml/dispatches \
          -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"cycle\":\"$NEXT_CYCLE\"}}"
          while ! rsync rsync://${{ secrets.TAILSCALE_IP_2 }} >/dev/null 2>&1; do sleep 5; done
          rsync -a --info=progress2 --inplace "$GITHUB_WORKSPACE/depot_tools/" rsync://${{ secrets.TAILSCALE_IP_2 }}/runner-node-2/depot_tools
          rsync -a --info=progress2 --inplace "$GITHUB_WORKSPACE/.cache/" rsync://${{ secrets.TAILSCALE_IP_2 }}/runner-node-2/.cache
          rsync -a --info=progress2 --inplace "$GITHUB_WORKSPACE/chrome/" rsync://${{ secrets.TAILSCALE_IP_2 }}/runner-node-2/chrome
          touch "$GITHUB_WORKSPACE/.rsync_complete"
          rsync -a --info=progress2 --inplace "$GITHUB_WORKSPACE/.rsync_complete" rsync://${{ secrets.TAILSCALE_IP_2 }}/runner-node-2/.rsync_complete
          docker stop tailscale
          sleep 2h
          exit 0
